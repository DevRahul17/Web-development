<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Object-fit and position</title>
    <style>
        .container{
            border: 2px solid black;
            height: 600px;
            width: 500px;
            background-position: center center;
            background-repeat: no-repeat;
            /* background-clip: border-box; */
            background-image: url("https://img.magnific.com/free-photo/closeup-shot-beautiful-butterfly-with-interesting-textures-orange-petaled-flower_181624-7640.jpg?semt=ais_hybrid&w=740&q=80");
        }

        img{
            height: 600px;
            width: 500px;
            object-fit: cover;
            /* object-fit: fill; */
            /* object-position: bottom-left; */
            /* object-fit: contain; */
            /* object-fit: 50% 50%; */
            /* cover fit w and h of img */
            /* contain good for aspect ratio but remains some space */
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- <img src="https://img.magnific.com/free-photo/closeup-shot-beautiful-butterfly-with-interesting-textures-orange-petaled-flower_181624-7640.jpg?semt=ais_hybrid&w=740&q=80" alt=""> -->
    </div>
</body>
</html>
