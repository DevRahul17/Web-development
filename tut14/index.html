<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        div,span{/* div is selector and inside it is declaration */
            color: red;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div>
        Today we started CSS
    </div>

    <div>
        I am Good
    </div>

    <span>
        I am also good
    </span>

    <p>
        Lorem ipsum dolor.
    </p>
</body>
</html>
