<!--Semantic HTML means using HTML tags that describe the meaning
 and purpose of the content, not just how it looks.
 | Tag            | Purpose                                       |
| -------------- | --------------------------------------------- |
| `<header>`     | Top section of a page or section              |
| `<nav>`        | Navigation links                              |
| `<main>`       | Main content of the page                      |
| `<section>`    | A related section of content                  |
| `<article>`    | Independent content (blog post, news article) |
| `<aside>`      | Sidebar or related content                    |
| `<footer>`     | Bottom section of a page                      |
| `<figure>`     | Groups media like images or diagrams          |
| `<figcaption>` | Caption for a `<figure>`                      |
 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Tags</title>
</head>
<body>

    <header><!--header-->
        <nav>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Contact Us</li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>What are Semantic Tags</h1><!--main-->
    </main>

    <footer>
        Copyright
    </footer>
    
</body>
</html>
