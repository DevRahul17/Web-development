<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8</title>
    <style>
        .container {
            background-color: blue;
            width: 70vw;
            height: 97vh;
            position: relative;
        }

        .box {
            background-color: fuchsia;
            width: 4.3vw;
            height: 9vh;
            border-radius: 70px;
            position: absolute;
            bottom: 0;
            left: 0;
            animation: animationx 3s linear 1s infinite,
                animationy 1s ease-out 1s infinite alternate;
        }

        @keyframes animationx {
            from {
                left: 0%;
            }

            to {
                left: 100%;
            }
        }

        @keyframes animationy {
            from {
                bottom: 0%;
            }

            to {
                bottom: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>

</html>
