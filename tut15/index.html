<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline,Internal and External CSS</title>
    <style>
        h2{/* Internal CSS */
            color: red;
            background-color: yellow;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 style="color: yellow;background-color: red;">Inline CSS</h1>
    <h2>Internal CSS</h2>
    <h3>External CSS</h3>

    <div>
        I am Rahul Kumar
    </div>
    <p>I am a paragraph</p>
</body>
</html>

<!-- Theory
1.Inline CSS is used to apply a unique style to a single HTML element. It uses the style attribute directly within the HTML tag.
2.Internal CSS is used to style a single HTML page. The styles are defined inside a <style> element, which is placed within the <head> section of the HTML document.
3.External CSS is the industry standard for web development. All style rules are written in a separate, dedicated file (with a .css extension), and then linked to the HTML document using the <link> tag inside the <head> section. -->
