<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filters</title>
    <style>
        .img1{
            filter: brightness(120%);
        }

        .img2{
            filter: grayscale(20%);
        }

        .img3{
            filter: opacity(90%);
        }
    </style>
</head>

<body>
    <div class="container">
        <img class="img1" src="https://i.pinimg.com/474x/54/54/ee/5454ee888879d00338bbffc733c77090.jpg?nii=t">
        <img class="img2" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSdDLUy50DVrPM3YtupY5OtnnxkqJiO8KMB-OZ4L_Q4p-tr3E3PVsp3aEyX&s=10">
        <img class="img3" src="https://assets.vogue.in/photos/6108d1e1578ff515bee7dfd8/2:3/w_2560%2Cc_limit/Money-Heist-Season-5-Trailer.jpeg">
    </div>
</body>

</html>
