<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
</head>

<!--Attribute src="file name" and alt="When we insert wrong file name it display alt"-->
<img height="300" width="400" src="image.png" alt="Train Image">
<br><!--Breaking line tag-->
<table>
    <caption>Display at top</caption>

    <thead>
        <!--header content-->
        Header
        <tr><!--For table row-->
            <th>Name</th><!--For table heading-->
            <th>Role</th>
            <th>Language</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>Rahul</td><!--Tag for Table data-->
            <td>Teacher</td>
            <td>Java</td>
        </tr>

        <tr>
            <td colspan="2">Sam</td><!--colspan for taking 2 columns-->
            <td rowspan="2">Javascript</td>
        </tr>
    </tbody>


    <tfoot>
        Footer
        <tr>
            <td colspan="2">Sam</td><!--colspan for taking 2 columns-->
        </tr>
    </tfoot>
</table>

<ul><!--Unordered List-->
    <li>Apple</li>
    <li>Mango</li>
    <li>Banana</li>
</ul>

<ul type="square"><!--Unordered List-->
    <li>Apple</li>
    <li>Mango</li>
    <li>Banana</li>
</ul>

<!--Ordered List-->
<ol>
    <li>One</li>
    <li>Two</li>
    <li>Three</li>
</ol>

<!--Ordered List-->
<ol type="A">
    <li>One</li>
    <li>Two</li>
    <li>Three</li>
</ol>


</html>
