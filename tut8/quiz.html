<!--Quiz:
Without using br tag,write a vertically aligned form asking for name,
city and pincode of a user.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz using form</title>
</head>
<body>
    <h1>Details</h1>
    <form action="post">
    <div>
        <label for="name">Name:</label>
        <input type="text" id="username" name="username" placeholder="Enter your name">
    </div>

    <div>
        <label for="city">City:</label>
        <input type="text" id="city" name="city" placeholder="Enter your city">
    </div>

    <div>
        <label for="pincode">Pincode:</label>
        <input type="text" id="pincode" name="pincode" placeholder="Enter your pincode">
    </div>

    <div>
        <input type="submit" value="Submit"><!--For Submit-->
    </div>
    </form>
</body>
</html>
