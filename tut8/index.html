<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and Block Elements - HTML</title>
    <!--Inline are those elements which take required width-->

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <p>This is a paragraph</p><!--It is block element--->
    <a href="https://google.com">Google</a><!----Inline---->
    <div>I am block element</div>
    <span>I am span and inline</span><a href="">yes</a>
</body>

</html>
