<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform</title>
    <link rel="stylesheet" href="syle.css">
</head>
<body>
    <div class="wrap">
        <div class="box">
            <div class="bluescaleX">scaleX</div>
        </div>
        <div class="box">
            <div class="bluescaleY">scaleY</div>
        </div>
        <div class="box">
            <div class="bluescale">scale</div>
        </div>

        <div class="box">
            <div class="bluetranslateX">translateX</div>
        </div>
        <div class="box">
            <div class="bluetranslateY">translateY</div>
        </div>
        <div class="box">
            <div class="bluetranslate">translate</div>
        </div>

        <div class="box">
            <div class="bluematrix">matrix</div>
        </div>

        <div class="box">
            <div class="bluerotate">rotate</div>
        </div>

        <div class="box">
            <div class="blueskew">skew</div>
        </div>
        <div class="box">
            <div class="blueskewX">skewX</div>
        </div>
        <div class="box">
            <div class="blueskewY">skewY</div>
        </div>

        <div class="box">
            <div class="bluematrix3d">matrix3d</div>
        </div>

        <div class="box">
            <div class="bluetranslate3d">translate3d</div>
        </div>

        <div class="box">
            <div class="bluerotateY">rotateY</div>
        </div>
        <div class="box">
            <div class="bluerotateX">rotateX</div>
        </div>

        <div class="box">
            <div class="bluetranslateZ">translateZ</div>
        </div>
    </div>
</body>
</html>
