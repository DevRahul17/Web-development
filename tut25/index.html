<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styling Lists using CSS</title>
    <style>
        nav ul li{
            /* list-style: circle; */
            list-style-type: "❤️ ";
            /* list-style: none; */
            /* display: flex; */
            /* list-style-image: url(""); */
            background-color: aqua;
            list-style-position: inside;
            border: 5px solid rgb(220, 19, 176);
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact Us</li>
        </ul>
    </nav>
</body>
</html>

<!-- List have marker and list element -->
